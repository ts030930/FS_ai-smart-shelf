<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 스마트 매대 - 회원가입</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn { background-color: #198754; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn:hover { background-color: #157347; }
        .helptext { font-size: 12px; color: #6c757d; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center;">📝 점주 회원가입</h2>
        <form method="post">
            {% csrf_token %}
            <!-- 장고가 자동으로 만들어주는 회원가입 입력칸을 렌더링합니다 -->
            {{ form.as_p }}
            <button type="submit" class="btn">가입 완료 및 시작하기</button>
        </form>
    </div>
</body>
</html>
