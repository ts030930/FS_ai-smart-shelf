<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원정보 및 매대 설정</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ced4da; }
        .btn-update { background-color: #0d6efd; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px;}
        .btn-reset { background-color: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'dashboard' %}" class="back-link">⬅ 대시보드로 돌아가기</a>
        <h2>👤 {{ request.user.username }} 점주님의 매장 설정</h2>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="update" value="true">
            <h3>매대 품목 변경</h3>
            
            {% for shelf in shelves %}
            <div class="form-group">
                <label><b>{{ shelf.shelf_number }}번 매대</b></label>
                <select name="category_{{ shelf.id }}">
                    <!-- 기존에 선택했던 값이 기본으로 선택되도록(selected) 처리 -->
                    <option value="라면" {% if shelf.category == '라면' %}selected{% endif %}>라면</option>
                    <option value="FF" {% if shelf.category == 'FF' %}selected{% endif %}>FF (프레시푸드)</option>
                    <option value="빵" {% if shelf.category == '빵' %}selected{% endif %}>빵</option>
                    <option value="과자" {% if shelf.category == '과자' %}selected{% endif %}>과자</option>
                    <option value="음료수" {% if shelf.category == '음료수' %}selected{% endif %}>음료수</option>
                    <option value="주류" {% if shelf.category == '주류' %}selected{% endif %}>주류</option>
                </select>
            </div>
            {% endfor %}
            <button type="submit" class="btn-update">품목 변경 저장</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <form method="post" onsubmit="return confirm('매대 개수를 포함하여 처음부터 다시 설정하시겠습니까? 기존 데이터가 삭제됩니다.');">
            {% csrf_token %}
            <input type="hidden" name="reset" value="true">
            <h3>매대 전체 초기화</h3>
            <p style="font-size: 13px; color: #6c757d;">매대 개수가 변경되었거나 매장을 재설계할 경우 눌러주세요.</p>
            <button type="submit" class="btn-reset">초기화 및 개수 재설정</button>
        </form>
    </div>
</body>
</html>
